name: Deploy Dashboard

on:
  # 代码推送后自动部署
  push:
    branches: [main]
  # 每个交易日 9:00 + 12:00 + 16:00 CST (01:00 + 04:00 + 08:00 UTC) 自动运行
  schedule:
    - cron: '0 1,4,8 * * 1-5'
  # 手动触发
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Pipeline
        run: python backend/pipeline.py
        env:
          HT_APIKEY: ${{ secrets.HT_APIKEY }}

      - name: Build static Dashboard
        run: python backend/build_dashboard.py
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_AI_TOKEN: ${{ secrets.CF_AI_TOKEN }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy output/ --project-name=investment-dashboard --branch=main
