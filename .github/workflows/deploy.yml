name: Deploy Dashboard

on:
  # 每个交易日 16:00 CST (08:00 UTC) 自动运行
  schedule:
    - cron: '0 8 * * 1-5'
  # 手动触发
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Pipeline
        run: python backend/pipeline.py
        env:
          HT_APIKEY: ${{ secrets.HT_APIKEY }}

      - name: Build static Dashboard
        run: python backend/build_dashboard.py

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy output/ --project-name=investment-dashboard
